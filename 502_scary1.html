<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 Bad Gateway - Pengawas</title>
    <style>
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        @keyframes creep {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(5px, -5px) rotate(2deg); }
            50% { transform: translate(-5px, 5px) rotate(-2deg); }
            75% { transform: translate(5px, 5px) rotate(1deg); }
            100% { transform: translate(-5px, -5px) rotate(-1deg); }
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,0,0.1) 2px, rgba(255,0,0,0.1) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,0,0,0.1) 2px, rgba(255,0,0,0.1) 4px);
        }
        .container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
            animation: creep 6s infinite;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #f00;
            text-shadow: 0 0 5px #f00, 0 0 10px #f00;
            animation: pulse 2s infinite;
        }
        .error-code {
            font-size: 10rem;
            letter-spacing: -8px;
            font-weight: bold;
            color: #800;
            text-shadow: 0 0 10px #800;
            margin: 20px 0;
            animation: pulse 3s infinite;
        }
        p {
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #fff;
        }
        .warning {
            color: #ff0;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        .btn {
            display: inline-block;
            margin: 15px;
            padding: 12px 28px;
            background: #800;
            color: #fff;
            text-decoration: none;
            border: 2px solid #f00;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 20px #f00;
        }
        .eyes {
            position: absolute;
            top: 20%;
            width: 100%;
            height: 20%;
            pointer-events: none;
        }
        .eye {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #000 30%, #f00 70%);
            border-radius: 50%;
            box-shadow: inset 0 0 20px #000, 0 0 15px #f00;
            animation: blinkEye 4s infinite;
        }
        .eye.left { left: 30%; }
        .eye.right { right: 30%; }
        @keyframes blinkEye {
            0%, 90% { transform: scaleY(1); }
            92% { transform: scaleY(0.1); }
            95% { transform: scaleY(0.1); }
            98% { transform: scaleY(1); }
        }
    </style>
</head>
<body>
    <div class="eyes">
        <div class="eye left"></div>
        <div class="eye right"></div>
    </div>
    <div class="container">
        <div class="error-code">502</div>
        <h1>Bad Gateway</h1>
        <p class="warning">Ada yang mengawasimu dari balik layar ini.</p>
        <p>Jangan coba refresh lagi. Ia tahu kamu takut.</p>
        <p>Jika kamu menutup halaman ini... ia akan mengikutimu.</p>
        <a href="javascript:history.back()" class="btn">Kembali</a>
        <a href="/" class="btn">Beranda</a>
    </div>
</body>
</html>
