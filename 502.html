<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 Bad Gateway - Halaman Teror</title>
    <style>
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            color: #f00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,0,0,0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255,0,0,0.1) 0%, transparent 20%);
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #f00;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 30px #f00;
            animation: blink 1.5s infinite;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            text-shadow: 0 0 10px #f00, 0 0 20px #f00, 0 0 30px #f00;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.4;
            margin: 20px 0;
        }
        .error-code {
            font-size: 8rem;
            letter-spacing: -5px;
            margin: 20px 0;
            text-shadow: 0 0 5px #f00;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: #800;
            color: #fff;
            text-decoration: none;
            border: 1px solid #f00;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 15px #f00;
        }
        .creepy-text {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #f88;
            animation: blink 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">502</div>
        <h1>Bad Gateway</h1>
        <p class="creepy-text">Server tidak merespons... atau mungkin sengaja tidak menjawab.</p>
        <p>Sesuatunya di balik layar ini sedang menunggu... dan ia tahu kamu ada di sini.</p>
        <p>Jangan reload. Jangan pergi. Ia sedang menyaksikan.</p>
        <a href="javascript:history.back()" class="btn">Kembali</a>
        <a href="/" class="btn">Beranda</a>
    </div>
</body>
</html>
