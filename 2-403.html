
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>403 Forbidden - Annoyed Edition</title>
<style>
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    background-image: url('https://cn.devlance.tech/assets/tengkorak.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(2px);
    animation: blinkBg 1s infinite alternate;
    color:#fff;
    font-family:sans-serif;
  }
  @keyframes blinkBg{
    from{filter: blur(2px) brightness(0.8);}
    to{filter: blur(2px) brightness(1.2);}
  }
  #annoy{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .flash{animation:flash 0.3s infinite alternate;}
  @keyframes flash{from{background:#f00;}to{background:#0f0;}}
  .shake{animation:shake 0.1s infinite;}
  @keyframes shake{0%{transform:translate(-50%,-50%) rotate(0deg);}25%{transform:translate(-50%,-50%) rotate(2deg);}50%{transform:translate(-50%,-50%) rotate(0deg);}75%{transform:translate(-50%,-50%) rotate(-2deg);}100%{transform:translate(-50%,-50%) rotate(0deg);}}
  .marquee{display:block;width:100%;white-space: nowrap;overflow:hidden;box-sizing:border-box;}
  .marquee span{display:inline-block;padding-left:100%;animation:marquee 15s linear infinite;}
  @keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
<div id="annoy">
  <h1 class="flash shake">403 Forbidden</h1>
  <div class="marquee"><span>ACCESS DENIED GO AWAY YOU ARE NOT WELCOME HERE STOP TRYING ACCESS DENIED GO AWAY YOU ARE NOT WELCOME HERE STOP TRYING</span></div>
  <p>Seriously, just leave.</p>
  <button onclick="window.history.back()">Go Back (if you dare)</button>
</div>
<script>
// Annoying beep using Web Audio API
function beep(){const ctx=new (window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type='square';osc.frequency.setValueAtTime(800,ctx.currentTime);gain.gain.setValueAtTime(0.2,ctx.currentTime);osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.1);}
setInterval(beep,800);
// Also change background color randomly
setInterval(()=>{document.body.style.backgroundColor=`hsl(${Math.random()*360},80%,20%)`;},500);
// Create moving random elements that bounce
(function(){
  const createBox=()=>{
    const box=document.createElement('div');
    box.style.position='absolute';
    box.style.width='30px';
    box.style.height='30px';
    box.style.backgroundColor=`hsl(${Math.random()*360},80%,50%)`;
    box.style.borderRadius='50%';
    box.style.left=Math.random()*window.innerWidth+'px';
    box.style.top=Math.random()*window.innerHeight+'px';
    document.body.appendChild(box);
    let dx=(Math.random()-0.5)*8, dy=(Math.random()-0.5)*8;
    const move=()=>{
      const l=parseFloat(box.style.left)+dx;
      const t=parseFloat(box.style.top)+dy;
      if(l<0||l>window.innerWidth-30) dx=-dx;
      if(t<0||t>window.innerHeight-30) dy=-dy;
      box.style.left=Math.max(0,Math.min(window.innerWidth-30,l))+'px';
      box.style.top=Math.max(0,Math.min(window.innerHeight-30,t))+'px';
      requestAnimationFrame(move);
    };
    requestAnimationFrame(move);
  };
  for(let i=0;i<20;i++) createBox();
})();
</script>
</body>
</html>
